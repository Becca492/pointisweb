<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/css/form.css" />
    <title>Illustration Formulaire</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page-title">Illustration Formulaire</div>

    <div class="layout">
      <div class="left-panel">
        <div class="action-row">
          <button class="btn-valider">Valider</button>
          <button class="btn-retour">Retour</button>
          <div class="btn-share">↗</div>
        </div>

        <div class="color-swatch-row">
          <div class="color-grid">
            <span></span><span></span> <span></span><span></span>
          </div>
          <span class="color-hex">#000000</span>
        </div>

        <div class="chip chip-green">#8a8a8a</div>
        <div class="chip chip-gray">#eeeeee</div>
      </div>

      <div class="form-card">
        <div class="form-header">
          <div class="form-add-icon">+</div>
          <div class="form-header-label">Ajouter un accompagnateur</div>
        </div>

        <div class="form-body">
          <div class="form-grid">
            <div class="form-group span-2">
              <label>Nom et prénom de l'accompagnateur</label>
              <input
                type="text"
                class="input-highlight"
                value="KANGBE REBECCA"
              />
            </div>

            <div class="form-group">
              <label>Pièces d'identité</label>
              <div class="sel-wrap">
                <select>
                  <option>CNI</option>
                  <option>Passeport</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label>Enfant concerné</label>
              <div class="sel-wrap">
                <select>
                  <option value="">— Sélectionner —</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label>Service</label>
              <div class="sel-wrap">
                <select>
                  <option value="">— Sélectionner —</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label>Pièces jointes</label>
              <div class="file-row">
                <span class="file-name">CNI_KANGBE.pdf</span>
                <span class="clip-icon">📎</span>
              </div>
            </div>

            <div class="form-group span-2">
              <label>Période d'accompagnement</label>
              <div class="date-row">
                <div class="date-input-wrap">
                  <input type="date" value="2025-11-10" />
                </div>
                <span class="date-sep">Au</span>
                <div class="date-input-wrap">
                  <input type="date" value="2026-06-15" />
                </div>
              </div>
            </div>

            <div class="form-group">
              <label>&nbsp;</label>
              <div class="check-row">
                <label class="check-item"
                  ><input type="checkbox" /> Case à cocher</label
                >
                <label class="check-item"
                  ><input type="checkbox" /> Case à cocher</label
                >
              </div>
            </div>

            <div class="form-group span-3">
              <label>Mot pour l'administration</label>
              <textarea placeholder="Mot pour l'administration"></textarea>
            </div>
          </div>
        </div>

        <div class="form-footer">
          <button class="btn-valider">Valider</button>
          <button class="btn-retour">Retour</button>
        </div>
      </div>
    </div>
  </body>
</html>
